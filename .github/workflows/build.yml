name: Build & Release TDZ Binary

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goarch: amd64,  goos: linux, label: amd64 }
          - { goarch: 386,    goos: linux, label: i386 }
          - { goarch: arm64,  goos: linux, label: arm64 }
          - { goarch: arm,    goos: linux, label: armv7,  goarm: '7' }
          - { goarch: arm,    goos: linux, label: armv6,  goarm: '6' }
          - { goarch: arm,    goos: linux, label: armv5,  goarm: '5' }
          - { goarch: s390x,  goos: linux, label: s390x }
          - { goarch: mips64, goos: linux, label: mips64 }
          - { goarch: riscv64,goos: linux, label: riscv64 }

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Prepare original scripts
        run: |
          mkdir -p original
          cp *.sh original/ 2>/dev/null || true
          cp *.py original/ 2>/dev/null || true
          ls -la original/

      - name: Encrypt scripts
        run: go run cmd/encrypt/main.go

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o tdz ./cmd/tdz/

      - name: UPX pack
        run: |
          sudo apt-get install -y -qq upx-ucl 2>/dev/null || true
          upx --best --lzma tdz 2>/dev/null || true

      - name: Package
        run: tar czf "tdz-linux-${{ matrix.label }}.tar.gz" tdz

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tdz-linux-*.tar.gz

      - name: Upload artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: tdz-linux-${{ matrix.label }}
          path: tdz-linux-*.tar.gz
